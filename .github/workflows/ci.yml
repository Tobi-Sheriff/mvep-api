name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mvep_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Both vars point to the same CI database.
      # jestSetup.ts overrides DATABASE_URL → TEST_DATABASE_URL at test runtime.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mvep_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mvep_test

      JWT_SECRET: ci-test-jwt-secret-key-not-for-production-use-only
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173

      # SMTP values must pass Zod validation on startup.
      # Actual email sending is mocked in integration tests (jest.mock).
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 587
      SMTP_USER: ci-placeholder
      SMTP_PASS: ci-placeholder
      EMAIL_FROM: noreply@mvep.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npx jest --no-coverage --forceExit
